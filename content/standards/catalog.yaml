# TFX Design Standard — control catalog v0.1
# A control is one verifiable statement. If you can't check it, it's not a standard.
# Tiers: L0 = non-negotiable (no waiver) · L1 = mandatory (documented waiver) · L2 = recommended (inline rationale)
# Generated from harness/standards/catalog.yaml (the single source of truth,
# consolidated 2026-06-11) — edit THAT file and regenerate; do not edit here.
meta:
  version: "0.1"
  updated: "2026-06-12"
  waiver_syntax: 'tfx-waive <ID> reason="<specific reason>"'

controls:
  - id: A11Y-1
    category: Accessibility
    tier: L0
    check: deterministic
    statement: "Text meets WCAG AA contrast — 4.5:1 body, 3:1 large text and UI components"
    fails_when:
      - "body copy under 4.5:1 against its background"
      - "gray text on coloured backgrounds that fails AA"
  - id: A11Y-2
    category: Accessibility
    tier: L0
    check: deterministic
    statement: "Every interactive element is keyboard-reachable with a visible focus state"
    fails_when:
      - "focus ring removed without replacement"
      - "click handlers on non-focusable elements"
  - id: A11Y-3
    category: Accessibility
    tier: L0
    check: deterministic
    statement: "Every form field has a programmatically associated, visible label"
    fails_when:
      - "placeholder used as the only label"
      - "icon-only button without aria-label"
  - id: A11Y-4
    category: Accessibility
    tier: L1
    check: deterministic
    statement: "Interactive targets are at least 24x24px (44px on mobile)"
    fails_when:
      - "visual target smaller with no expanded hit area"
  - id: A11Y-5
    category: Accessibility
    tier: L1
    check: deterministic
    statement: "prefers-reduced-motion disables all non-essential animation"
    fails_when:
      - "no reduced-motion variant provided"
  - id: A11Y-6
    category: Accessibility
    tier: L1
    check: deterministic
    statement: "Essential non-text content has a text alternative; decorative content is hidden from assistive technology"
    fails_when:
      - "informative image with an empty alt"
      - "decorative icon exposed to assistive technology (no aria-hidden)"
  - id: A11Y-7
    category: Accessibility
    tier: L1
    check: hybrid
    statement: "Structure is programmatically determinable — semantic headings, lists, tables, and form groups; headings and labels describe their content"
    fails_when:
      - "styled divs standing in for headings, lists, or tables"
      - "headings or labels that do not describe their content"
  - id: A11Y-8
    category: Accessibility
    tier: L1
    check: hybrid
    statement: "Custom components expose name, role, and value to assistive technology"
    fails_when:
      - "custom control with no role or accessible name"
      - "visual state change with no ARIA state update"
  - id: A11Y-9
    category: Accessibility
    tier: L1
    check: deterministic
    statement: "Every page or distinct view has a descriptive title, and the main language is marked up"
    fails_when:
      - "every SPA view sharing one static document title"
      - "missing or wrong html lang attribute"
  - id: A11Y-10
    category: Accessibility
    tier: L1
    check: deterministic
    statement: "Repeated blocks of content are bypassable — skip link or landmark navigation to main content"
    fails_when:
      - "no skip link and no landmarks on a page with repeated chrome"
  - id: A11Y-11
    category: Accessibility
    tier: L1
    check: hybrid
    statement: "Async state changes are announced and focus is managed — transient status via live regions without stealing focus; context replacements move focus to the revealed surface, never both for the same message"
    fails_when:
      - "message announced by both a live region and a focus move"
      - "transient toast stealing focus"
  - id: TOK-1
    category: Tokens & theming
    tier: L1
    check: deterministic
    statement: "UI code contains no raw colour values — semantic (shadcn) tokens only"
    fails_when:
      - "hex/rgb/hsl literals in component code"
  - id: TOK-2
    category: Tokens & theming
    tier: L1
    check: deterministic
    statement: "All spacing values come from the shadcn default token scale"
    fails_when:
      - "arbitrary pixel values for margin/padding/gap"
  - id: TOK-3
    category: Tokens & theming
    tier: L1
    check: deterministic
    statement: "Corner radii come from the shadcn default radius scale"
    fails_when:
      - "ad-hoc radius values"
      - "child radius larger than parent (non-concentric nesting)"
  - id: TYP-1
    category: Typography
    tier: L1
    check: deterministic
    statement: "Display text is Plus Jakarta Sans (600); body/UI text is Inter (400/500/600); no other typefaces"
    fails_when:
      - "any third typeface in product UI"
  - id: TYP-2
    category: Typography
    tier: L1
    check: deterministic
    statement: "Body text at least 14px; labels at least 11px; body line-height 1.5-1.6"
    fails_when:
      - "body copy below 14px"
      - "line-height under 1.5 on multi-line body text"
  - id: TYP-3
    category: Typography
    tier: L1
    check: deterministic
    statement: "Type sizes come from the TFX type scale; no off-scale sizes"
    fails_when:
      - "font sizes not on the published scale"
  - id: TYP-4
    category: Typography
    tier: L2
    check: deterministic
    statement: "All-caps is used only for short labels"
    fails_when:
      - "uppercase running text or headings"
  - id: COL-1
    category: Colour
    tier: L1
    check: deterministic
    statement: "Primary actions and brand moments use Teacher & School Blue"
    fails_when:
      - "primary CTA in a non-primary colour"
      - "another product's primary used for emphasis"
  - id: COL-2
    category: Colour
    tier: L1
    check: deterministic
    statement: "Functional colours (success/warning/danger) come from the shared Radix Colors scales, never ad-hoc"
    fails_when:
      - "custom green/red/amber values"
      - "red used decoratively"
  - id: CMP-1
    category: Components & patterns
    tier: L1
    check: hybrid
    statement: "Where a Base UI-based component exists for the need, it is used; one-offs require a waiver"
    fails_when:
      - "custom dropdown/dialog/tooltip where the stack provides one"
  - id: CMP-2
    category: Components & patterns
    tier: L0
    check: hybrid
    statement: "Destructive actions show consequences before executing and offer undo or explicit confirmation"
    fails_when:
      - "silent destructive action"
      - "confirmation that does not state what will be lost"
  - id: CMP-3
    category: Components & patterns
    tier: L1
    check: hybrid
    statement: "Every async transaction has visible loading, success, and error states"
    fails_when:
      - "missing error state"
      - "loading state that flickers (no min visible time)"
  - id: CNT-1
    category: Content & naming
    tier: L1
    check: hybrid
    statement: "Error messages state what happened and what to do next; no raw error codes as the primary message"
    fails_when:
      - "\"Something went wrong\" with no next step"
      - "stack traces or codes shown to teachers"
  - id: CNT-2
    category: Content & naming
    tier: L1
    check: judgment
    statement: "Feature and page names use plain language; no invented portmanteaus, no internal codenames in UI"
    fails_when:
      - "names that require explanation"
  - id: CNT-3
    category: Content & naming
    tier: L2
    check: hybrid
    statement: "UI copy uses second person and active voice; sentences 25 words or fewer"
    fails_when:
      - "passive constructions in instructions"
  - id: MOT-1
    category: Motion
    tier: L2
    check: deterministic
    statement: "Interface motion is 100-300ms with standard easing; no decorative motion on critical paths"
    fails_when:
      - "animations over 300ms on task flows"
      - "transition-all"
  - id: IDN-1
    category: Identity
    tier: L1
    check: deterministic
    statement: "Product lockups and logos render only from approved assets; no recreations"
    fails_when:
      - "rebuilt or distorted logo marks"
  - id: SLP-1
    category: Anti-slop
    tier: L1
    check: deterministic
    statement: "No purple/violet gradient palettes, cyan-on-dark theming, or glow accents"
    fails_when:
      - "the default AI aesthetic anywhere in product UI"
  - id: SLP-2
    category: Anti-slop
    tier: L1
    check: deterministic
    statement: "No gradient text"
    fails_when:
      - "background-clip text gradients on headings or metrics"
  - id: SLP-3
    category: Anti-slop
    tier: L1
    check: deterministic
    statement: "No thick side-tab accent borders on rounded cards"
    fails_when:
      - "the single most recognisable AI-UI tell"
  - id: SLP-4
    category: Anti-slop
    tier: L1
    check: deterministic
    statement: "No nested cards; flatten with spacing, typography, and dividers"
    fails_when:
      - "cards inside cards inside cards"
  - id: SLP-5
    category: Anti-slop
    tier: L2
    check: deterministic
    statement: "No icon-tile-above-heading feature-card template; no identical card grids as default layout"
    fails_when:
      - "the universal AI feature-card shape repeated in a grid"
  - id: SLP-6
    category: Anti-slop
    tier: L2
    check: deterministic
    statement: "Adjacent type-scale steps differ by at least 1.25x; no flat hierarchy"
    fails_when:
      - "heading/subheading/body at nearly the same size"
  - id: SLP-7
    category: Anti-slop
    tier: L2
    check: deterministic
    statement: "Spacing has rhythm — related items grouped tighter than unrelated ones"
    fails_when:
      - "one spacing value used everywhere"
  - id: SLP-8
    category: Anti-slop
    tier: L1
    check: deterministic
    statement: "No bounce or elastic easing on interface elements"
    fails_when:
      - "dialogs that spring in with overshoot"
  - id: SLP-9
    category: Anti-slop
    tier: L2
    check: hybrid
    statement: "Copy carries no marketing buzzwords, em-dash chains, or redundant label/helper pairs"
    fails_when:
      - "streamline/empower/supercharge/world-class"
      - "label, sublabel, and helper saying the same thing"
  - id: SLP-10
    category: Anti-slop
    tier: L1
    check: judgment
    statement: "Complex multi-section tasks get a page, not a modal"
    fails_when:
      - "modal with its own scrollbar and column layout"
