# TFX Design Standard — control catalog (single source of truth)
# Normative source: TFX Design Standard (TFX-DS) v0.1 seed catalog.
# Consumers: the design harness (agent enforcement — this repo's skills/checks)
# and the TFX-DS website (human presentation — renders and serves this file raw).
# Format: standards/README.md. Detail files: standards/controls/<id>.md
# WCAG 2.2 AA is the self-imposed accessibility floor (kept because it's right,
# not because it's mandated). SGDS / GOV.UK are reference points, not rules.
# Consolidated 2026-06-11 from the harness catalog (28 controls, operational
# schema) and the site seed catalog (32 controls, incl. SLP-1..10): union of
# both, harness schema, site fails_when bullets carried per entry.

meta:
  version: "0.1"
  updated: "2026-06-25"
  waiver_syntax: 'tfx-waive <ID> reason="<specific reason>"'
  categories:
    A11Y: Accessibility
    TOK: Tokens & theming
    TYP: Typography
    COL: Colour
    CMP: Components & patterns
    CNT: Content & naming
    MOT: Motion
    IDN: Identity
    SLP: Anti-slop
    LAY: Layout

controls:
  # ── Accessibility (WCAG 2.2 AA — self-imposed floor) ──────────────────
  - id: A11Y-1
    source: TFX-DS
    title: Text meets WCAG AA contrast — 4.5:1 body, 3:1 large text and UI components
    tier: L0
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Contrast scan (axe or checks/contrast); zero violations"
    waiver: none
    fails_when:
      - body copy under 4.5:1 against its background
      - gray text on coloured backgrounds that fails AA
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: A11Y-2
    source: TFX-DS
    title: Every interactive element is keyboard-reachable with a visible focus state
    tier: L0
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "Keyboard traversal covers all interactive elements; each shows a visible focus state"
    waiver: none
    fails_when:
      - focus ring removed without replacement
      - click handlers on non-focusable elements
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: A11Y-3
    source: TFX-DS
    title: Every form field has a programmatically associated, visible label
    tier: L0
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "Every input has an associated visible label element; checks/labels"
    waiver: none
    fails_when:
      - placeholder used as the only label
      - icon-only button without aria-label
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: A11Y-4
    source: TFX-DS
    title: Interactive targets are at least 24x24px (44px on mobile)
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "Computed hit area of interactive elements >= 24x24 CSS px (>= 44px at mobile widths)"
    waiver: documented
    fails_when:
      - visual target smaller with no expanded hit area
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: A11Y-5
    source: TFX-DS
    title: prefers-reduced-motion disables all non-essential animation
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "With prefers-reduced-motion set, non-essential animation does not run"
    waiver: documented
    fails_when:
      - no reduced-motion variant provided
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # A11Y-6..11: ratchet additions 2026-06-11 from the GovTech accessibility
  # checklist (a11y.tech.gov.sg, DSS-based) Essential tier + status-messages AA,
  # merged with evidence from loop runs 1-2. Approved: harness lead (Reza Ilmi,
  # direct instruction). A11Y-11 supersedes the pending "A11Y-6 focus movement"
  # proposal in docs/decisions/attendance.md.
  - id: A11Y-6
    source: TFX-DS
    title: Essential non-text content has a text alternative; decorative content is hidden from assistive technology
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Every img/svg/icon either has a text alternative (alt, aria-label, aria-labelledby) or is marked decorative (aria-hidden, empty alt)"
    waiver: documented
    fails_when:
      - informative image with an empty alt
      - decorative icon exposed to assistive technology (no aria-hidden)
    refs: [https://a11y.tech.gov.sg/checklist/]

  - id: A11Y-7
    source: TFX-DS
    title: Structure is programmatically determinable — semantic headings, lists, tables, and form groups; headings and labels describe their content
    tier: L1
    check: hybrid
    phase: [implement, verify]
    applies_to: [page]
    verify: "Script asserts semantic elements over styled divs (heading hierarchy, lists, fieldsets); evaluator judges headings/labels are descriptive and link text makes sense out of context"
    waiver: documented
    fails_when:
      - styled divs standing in for headings, lists, or tables
      - headings or labels that do not describe their content
    detail: controls/a11y-7.md
    refs: [https://a11y.tech.gov.sg/checklist/]

  - id: A11Y-8
    source: TFX-DS
    title: Custom components expose name, role, and value to assistive technology
    tier: L1
    check: hybrid
    phase: [implement, verify]
    applies_to: [component]
    verify: "Script asserts custom controls carry role + accessible name + state (e.g. aria-pressed/expanded/checked); evaluator judges the exposed semantics match the visual behavior"
    waiver: documented
    fails_when:
      - custom control with no role or accessible name
      - visual state change with no ARIA state update
    detail: controls/a11y-8.md
    refs: [https://a11y.tech.gov.sg/checklist/]

  - id: A11Y-9
    source: TFX-DS
    title: Every page or distinct view has a descriptive title, and the main language is marked up
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page]
    verify: "Document title describes the page purpose; html lang attribute present and correct; SPA views update the title"
    waiver: documented
    fails_when:
      - every SPA view sharing one static document title
      - missing or wrong html lang attribute
    refs: [https://a11y.tech.gov.sg/checklist/]

  - id: A11Y-10
    source: TFX-DS
    title: Repeated blocks of content are bypassable — skip link or landmark navigation to main content
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page]
    verify: "A skip-to-main link is the first focusable element, or main/nav landmarks allow AT users to bypass repeated chrome; n/a only for pages with no repeated chrome"
    waiver: documented
    fails_when:
      - no skip link and no landmarks on a page with repeated chrome
    refs: [https://a11y.tech.gov.sg/checklist/]

  - id: A11Y-11
    source: TFX-DS
    title: Async state changes are announced and focus is managed — transient status via live regions without stealing focus; context replacements move focus to the revealed surface, never both for the same message
    tier: L1
    check: hybrid
    phase: [plan, implement, verify]
    applies_to: [flow, component]
    verify: "Script asserts each async state change has either a live region or a focus target; evaluator judges the choice (transient → live region; context change → focus move) and that no message is announced twice"
    waiver: documented
    fails_when:
      - message announced by both a live region and a focus move
      - transient toast stealing focus
    detail: controls/a11y-11.md
    refs: [https://a11y.tech.gov.sg/checklist/]

  # ── Tokens & theming (Base UI + Radix Colors + shadcn defaults) ───────
  - id: TOK-1
    source: TFX-DS
    title: UI code contains no raw colour values — semantic (shadcn) tokens only
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Scan changed files for raw hex/rgb/hsl; checks/token-audit; exit 1 on violation"
    waiver: documented
    fails_when:
      - hex/rgb/hsl literals in component code
    detail: controls/tok-1.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: TOK-2
    source: TFX-DS
    title: All spacing values come from the shadcn default token scale
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "No off-scale margin/padding/gap values; checks/token-audit"
    waiver: documented
    fails_when:
      - arbitrary pixel values for margin/padding/gap
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: TOK-3
    source: TFX-DS
    title: Corner radii come from the shadcn default radius scale
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "No off-scale border-radius values; checks/token-audit"
    waiver: documented
    fails_when:
      - ad-hoc radius values
      - child radius larger than parent (non-concentric nesting)
      - peer containers of the same kind use different corner radii — anchor to the product's Card/base radius
    detail: controls/tok-3.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # ── Typography ────────────────────────────────────────────────────────
  - id: TYP-1
    source: TFX-DS
    title: Display text is Plus Jakarta Sans (600); body/UI text is Inter (400/500/600); no other typefaces
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Font-family scan; only Plus Jakarta Sans + Inter at approved weights; checks/type-scan"
    waiver: documented
    fails_when:
      - any third typeface in product UI
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: TYP-2
    source: TFX-DS
    title: Body text at least 14px; labels at least 11px; body line-height 1.5-1.6
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Type-scale scan; checks/type-scan"
    waiver: documented
    fails_when:
      - body copy below 14px
      - line-height under 1.5 on multi-line body text
    detail: controls/typ-2.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: TYP-3
    source: TFX-DS
    title: Type sizes come from the TFX type scale; no off-scale sizes
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Sizes in {120,96,72,48,32,24,20,18,16,14,12,11}; checks/type-scan"
    waiver: documented
    fails_when:
      - font sizes not on the published scale
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: TYP-4
    source: TFX-DS
    title: Text is never set in all-caps
    tier: L2
    check: deterministic
    phase: [implement, verify]
    applies_to: [content]
    verify: "Uppercase text-transform or all-caps strings flagged anywhere (labels, headings, body); genuine acronyms exempt; checks/type-scan"
    waiver: rationale
    fails_when:
      - all-caps text — labels, headings, or running text
      - text-transform uppercase used for styling (genuine acronyms excepted)
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # TYP-5: ratchet addition 2026-06-17 — tabular figures for numbers that align or
  # update, adopted from the make-interfaces-feel-better design-engineering skill;
  # high value for this number-heavy portfolio (grade tables, attendance counts,
  # live totals). Approved: harness lead (Reza Ilmi, direct instruction).
  - id: TYP-5
    source: TFX-DS
    title: "Numbers that align in columns or update in place use tabular figures (font-variant-numeric: tabular-nums)"
    tier: L2
    check: hybrid
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Numeric columns/tables and dynamically-updating numbers carry font-variant-numeric: tabular-nums (Tailwind `tabular-nums`); evaluator judges which figures align or update; checks/type-scan (planned)"
    waiver: rationale
    fails_when:
      - a column of figures (grades, counts, marks) in proportional numerals that fail to align vertically
      - a live counter, timer, or total that reflows horizontally as its digits change
    detail: controls/typ-5.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # ── Colour ────────────────────────────────────────────────────────────
  - id: COL-1
    source: TFX-DS
    title: Primary actions and brand moments use the product's own primary brand colour (or its ramp)
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Primary action / brand-moment colours resolve to the active product's primary token or its ramp (see controls/col-1.md for the per-product table)"
    waiver: documented
    fails_when:
      - primary CTA in a colour that is not the product's primary
      - one product's primary used inside another product's surface
    detail: controls/col-1.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # COL-2 broadened 2026-06-25 — ratchet, design-lead approved (small functional
  # text uses step-12 on a tint; HF-9). See docs/catalog-changes/contrast-functional-chips-step-12.md
  - id: COL-2
    source: TFX-DS
    title: Functional colours (success/warning/danger) come from the shared Radix Colors scales, never ad-hoc; small functional-colour text (≤12px chips/labels) uses the scale's step-12 on a tinted background so it clears AA (A11Y-1)
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Success/warning/danger/info colours resolve to Radix scale tokens, and small functional-colour text on a tint resolves to step-12 (step-11 on a step-3 tint lands ~4.25:1 and fails AA); contrast computed by checks/contrast / verified manually until wired"
    waiver: documented
    fails_when:
      - custom green/red/amber values
      - red used decoratively
      - small functional-colour text (≤12px) on a tint uses step-11 (or lower) and falls below 4.5:1
    detail: controls/col-2.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # ── Components & patterns ─────────────────────────────────────────────
  - id: CMP-1
    source: TFX-DS
    title: Where a Base UI-based component exists for the need, it is used; one-offs require a waiver
    tier: L1
    check: hybrid
    phase: [plan, implement, verify]
    applies_to: [page, component]
    verify: "Component usage diffed against the product manifest; evaluator judges 'exists for the need' edge cases; record carries one of the three fixed CMP-1 verdict forms (see controls/cmp-1.md)"
    waiver: documented
    fails_when:
      - custom dropdown/dialog/tooltip where the stack provides one
    detail: controls/cmp-1.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: CMP-2
    source: TFX-DS
    title: Destructive actions show consequences before executing and offer undo or explicit confirmation
    tier: L0
    check: hybrid
    phase: [plan, implement, verify]
    applies_to: [flow, component]
    verify: "Script enumerates destructive actions and asserts a consequence + undo/confirm surface exists; evaluator judges the consequence copy is plain and complete"
    waiver: none
    fails_when:
      - silent destructive action
      - confirmation that does not state what will be lost
    detail: controls/cmp-2.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: CMP-3
    source: TFX-DS
    title: Every async transaction has visible loading, success, and error states
    tier: L1
    check: hybrid
    phase: [plan, implement, verify]
    applies_to: [flow]
    verify: "Script confirms the three states exist per async action; evaluator judges each state communicates clearly"
    waiver: documented
    fails_when:
      - missing error state
      - loading state that flickers (no min visible time)
    detail: controls/cmp-3.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # CMP-4 is reserved for the pending empty-state-clarity proposal recorded in
  # docs/decisions/student-notes-empty-state.md — do not reuse this id elsewhere.
  # CMP-5 / CMP-6: ratchet additions 2026-06-17 — action hierarchy and the table
  # pattern, adopted from the design-engineering skills (ce-frontend-design,
  # make-interfaces-feel-better, userinterface-wiki) studied against the catalog.
  # Approved: harness lead (Reza Ilmi, direct instruction).
  - id: CMP-5
    source: TFX-DS
    title: Each view has at most one primary (filled) action; secondary and tertiary actions step down to outline, ghost, or link styling
    tier: L2
    check: hybrid
    phase: [plan, implement, verify]
    applies_to: [page, component]
    verify: "Script counts filled/primary-variant buttons per view; evaluator judges view/region boundaries and any deliberately co-equal actions"
    waiver: rationale
    fails_when:
      - two or more filled/primary buttons competing in one view with no deliberate co-equal reason
      - a destructive action styled as the primary instead of a distinct destructive variant (CMP-2)
      - every button rendered at the same weight, so nothing reads as the main action
    detail: controls/cmp-5.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: CMP-6
    source: TFX-DS
    title: Data tables use the table pattern — semantic rows and headers, numeric columns right-aligned with tabular figures, text left-aligned, and a header that stays visible while scrolling
    tier: L2
    check: hybrid
    phase: [implement, verify]
    applies_to: [component, page]
    verify: "Script asserts table/th semantics and right-aligned tabular numeric columns; evaluator judges header persistence, density, and that empty/loading states are designed (CMP-3)"
    waiver: rationale
    fails_when:
      - numeric columns centre- or left-aligned, or in proportional figures, so values do not line up (TYP-5)
      - a long table whose header scrolls out of view, leaving columns unlabelled
      - tabular data rendered as stacked cards or divs instead of a real table (A11Y-7)
      - a table that can be empty or slow has no designed empty or loading state (CMP-3)
    detail: controls/cmp-6.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # CMP-7 added 2026-06-25 — ratchet, design-lead approved (component-default
  # consistency, HF-19). See docs/catalog-changes/component-default-consistency.md
  - id: CMP-7
    source: TFX-DS
    title: Components stay consistent with their design-system defaults and with sibling-page usage — overriding a default's colour/contrast/shape, or breaking a control group's shared resting affordance, is a finding unless justified
    tier: L2
    check: judgment
    phase: [plan, implement, verify]
    applies_to: [page, component]
    verify: "Evaluator: the surface's components use their design-system defaults; any override of a default that changes colour, contrast, or shape is flagged (and its contrast re-checked under A11Y-1), the surface's component usage matches sibling pages, and a control group's members share one resting affordance; deterministic override-detection planned once the component manifest (CMP-1) is wired"
    waiver: rationale
    fails_when:
      - a design-system component default is overridden in a way that changes colour, contrast, or shape with no recorded reason
      - a component is used differently here than on sibling pages with no reason
      - members of one control group (toggle set, segmented control) do not share a resting affordance — only the selected one reads as interactive
    detail: controls/cmp-7.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # ── Content & naming ──────────────────────────────────────────────────
  - id: CNT-1
    source: TFX-DS
    title: Error messages state what happened and what to do next; no raw error codes as the primary message
    tier: L1
    check: hybrid
    phase: [implement, verify]
    applies_to: [content]
    verify: "Script finds error surfaces and flags raw codes; evaluator judges 'what happened -> what it means -> what to do next'"
    waiver: documented
    fails_when:
      - '"Something went wrong" with no next step'
      - stack traces or codes shown to teachers
    detail: controls/cnt-1.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: CNT-2
    source: TFX-DS
    title: Feature and page names use plain language; no invented portmanteaus, no internal codenames in UI
    tier: L1
    check: judgment
    phase: [intent, plan, verify]
    applies_to: [content]
    verify: "Evaluator: would a teacher understand the name without explanation? Portmanteaus and codenames are findings"
    waiver: documented
    fails_when:
      - names that require explanation
    detail: controls/cnt-2.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: CNT-3
    source: TFX-DS
    title: Copy leads with its purpose, uses second person and active voice, and keeps sentences to 25 words or fewer
    tier: L2
    check: hybrid
    phase: [implement, verify]
    applies_to: [content]
    verify: "Lint sentence length; evaluator judges voice and person, and that descriptive copy (titles, descriptions, section intros, empty states) leads with its purpose or role before the mechanism"
    waiver: rationale
    fails_when:
      - passive constructions in instructions
      - a title, description, or intro that opens with the mechanism (the tool, token, or library) instead of what it does for the teacher
    detail: controls/cnt-3.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # ── Motion & identity ─────────────────────────────────────────────────
  - id: MOT-1
    source: TFX-DS
    title: Interface motion is 100-300ms with standard easing; no decorative motion on critical paths
    tier: L2
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Animation durations in 100-300ms with standard easing; none on critical paths beyond functional feedback"
    waiver: rationale
    fails_when:
      - animations over 300ms on task flows
      - transition-all
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: IDN-1
    source: TFX-DS
    title: Product lockups and logos render only from approved assets; no recreations
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page]
    verify: "Logo/lockup files resolve to the approved asset library; no inline redraws"
    waiver: documented
    fails_when:
      - rebuilt or distorted logo marks
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  # ── Anti-slop (SLP-1..10) ─────────────────────────────────────────────
  # Adopted 2026-06-11 from the TFX-DS site seed catalog (v0.1) during the
  # catalog consolidation — the site and harness catalogs had diverged; these
  # ten existed only on the site. Guard against the default AI aesthetic.
  - id: SLP-1
    source: TFX-DS
    title: No purple/violet gradient palettes, cyan-on-dark theming, or glow accents
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Stylesheet scan: no purple/violet gradient palettes, no cyan-on-dark theming, no glow box-shadow accents"
    waiver: documented
    fails_when:
      - the default AI aesthetic anywhere in product UI
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-2
    source: TFX-DS
    title: No gradient text
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "Scan for background-clip:text (and -webkit- variant) gradient fills on text"
    waiver: documented
    fails_when:
      - background-clip text gradients on headings or metrics
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-3
    source: TFX-DS
    title: No thick side-tab accent borders on rounded cards
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "Scan for thick (>= 3px) left/side accent borders combined with border-radius on card containers"
    waiver: documented
    fails_when:
      - the single most recognisable AI-UI tell
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-4
    source: TFX-DS
    title: No nested cards; flatten with spacing, typography, and dividers
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "DOM scan: no card-styled container (border + radius + background) nested inside another"
    waiver: documented
    fails_when:
      - cards inside cards inside cards
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-5
    source: TFX-DS
    title: No icon-tile-above-heading feature-card template; no identical card grids as default layout
    tier: L2
    check: deterministic
    phase: [plan, implement, verify]
    applies_to: [page]
    verify: "Layout scan: no icon-tile-above-heading card template; no grid of identical cards as the default page layout"
    waiver: rationale
    fails_when:
      - the universal AI feature-card shape repeated in a grid
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-6
    source: TFX-DS
    title: Adjacent type-scale steps differ by at least 1.25x; no flat hierarchy
    tier: L2
    check: deterministic
    phase: [implement, verify]
    applies_to: [page]
    verify: "Adjacent steps used on the page differ by ratio >= 1.25; flag flat heading/subheading/body hierarchies"
    waiver: rationale
    fails_when:
      - heading/subheading/body at nearly the same size
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-7
    source: TFX-DS
    title: Spacing has rhythm — related items grouped tighter than unrelated ones
    tier: L2
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Spacing scan: related items grouped tighter than unrelated; flag a single spacing value used uniformly"
    waiver: rationale
    fails_when:
      - one spacing value used everywhere
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-8
    source: TFX-DS
    title: No bounce or elastic easing on interface elements
    tier: L1
    check: deterministic
    phase: [implement, verify]
    applies_to: [component]
    verify: "Easing scan: no bounce/elastic/overshoot easing (spring overshoot, cubic-bezier with y outside [0,1]) on interface elements"
    waiver: documented
    fails_when:
      - dialogs that spring in with overshoot
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-9
    source: TFX-DS
    title: Copy carries no AI-writing tells — marketing buzzwords, em-dash chains, filler, or redundant label/helper pairs
    tier: L2
    check: hybrid
    phase: [implement, verify]
    applies_to: [content]
    verify: "Lint for the buzzword, filler, and chatbot-artifact lists and em-dash chains; evaluator judges structural tells (negative parallelism, forced triads, copula avoidance, significance inflation), redundant label/helper pairs, and marketing tone"
    waiver: rationale
    fails_when:
      - streamline/empower/supercharge/world-class
      - label, sublabel, and helper saying the same thing
      - chatbot artifacts ("Great question!", "I hope this helps")
      - '"It''s not just X, it''s Y" / "serves as a" / forced triads doing rhetoric, not enumeration'
    detail: controls/slp-9.md
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  - id: SLP-10
    source: TFX-DS
    title: Complex multi-section tasks get a page, not a modal
    tier: L1
    check: judgment
    phase: [intent, plan, verify]
    applies_to: [flow, page]
    verify: "Evaluator: any task with multiple sections, its own scrolling, or a column layout gets a page, not a modal"
    waiver: documented
    fails_when:
      - modal with its own scrollbar and column layout
    detail: controls/slp-10.md
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  # SLP-11: ratchet addition 2026-06-17 — "a card only when the card is the
  # interaction", adopted from the compound-engineering ce-frontend-design skill;
  # completes the card trio with SLP-4 (no nested cards) and SLP-5 (no identical-card
  # grids). Approved: harness lead (Reza Ilmi, direct instruction).
  - id: SLP-11
    source: TFX-DS
    title: A card is only for an interactive unit (clickable, selectable, draggable); static content is grouped with spacing, type, and dividers
    tier: L2
    check: judgment
    phase: [plan, implement, verify]
    applies_to: [page, component]
    verify: "Evaluator: every card-styled container (border or shadow + radius + background) is a discrete interactive unit; if removing the card chrome would not hurt comprehension, it should not be a card"
    waiver: rationale
    fails_when:
      - static content boxed in card chrome purely for visual separation
      - a card used as a section wrapper where a heading plus spacing would group it
    detail: controls/slp-11.md
    refs: [https://github.com/transformteamsg/tfx-design-standard]

  # ── Layout (LAY) ──────────────────────────────────────────────────────
  - id: LAY-2
    source: TFX-DS
    title: Layout reflows to a single column with no loss at 320 CSS px (WCAG 2.2 SC 1.4.10); reading order and controls hold at 360/768/1280
    tier: L1
    check: judgment
    phase: [verify]
    applies_to: [page]
    verify: "Evaluator confirms single-column reflow with no two-dimensional scrolling at 320 CSS px (= 1280 at 400% zoom) and a usable reading order at each captured width"
    waiver: documented
    fails_when:
      - content or controls become unreachable or ambiguous at 320 px reflow
      - reading order reverses or a primary action disappears at the narrowest width
    detail: controls/lay-2.md
    refs: [https://www.w3.org/WAI/WCAG21/Understanding/reflow.html]

  - id: LAY-4
    source: TFX-DS
    title: "Body-text columns cap at a comfortable measure — target ~66ch, never above 80ch (WCAG 1.4.8); full-bleed running text is a finding"
    tier: L2
    check: deterministic
    phase: [implement, verify]
    applies_to: [page, component]
    verify: "Prose/body containers carry a max-width and the measure is <= 80ch (target ~66ch); checks/layout-scan (planned)"
    waiver: rationale
    fails_when:
      - body-text column has no max-width and spans the full viewport at 1280
      - measure exceeds 80ch
    detail: controls/lay-4.md
    refs: [https://www.w3.org/TR/WCAG21/#visual-presentation]

  # LAY-3 / LAY-5 / LAY-6: ratchet additions 2026-06-17 — activated from the layout
  # spike (docs/spikes/layout-category/SPEC.md), which specified them in full and left
  # them pending design-lead approval. LAY-1 (grid) deferred — it needs a declared
  # product grid (spike open Q4); peer-radius consistency stays in TOK-3 (spike Q3).
  # Approved: harness lead (Reza Ilmi, direct instruction).
  - id: LAY-3
    source: TFX-DS
    title: A surface maps to a known page template (workspace view, form, flow step, dashboard, settings, empty state, onboarding) rather than an ad-hoc shell
    tier: L2
    check: judgment
    phase: [plan, verify]
    applies_to: [page]
    verify: "Evaluator matches the surface to its declared page type (Phase 1) and flags a bespoke shell where a known template applies"
    waiver: rationale
    fails_when:
      - a surface invents a bespoke shell structure when an existing template applies
      - information hierarchy does not match the declared page type
    detail: controls/lay-3.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: LAY-5
    source: TFX-DS
    title: Density suits the task — neither cramped for data entry nor padded for scanning; extreme outliers in either direction are findings
    tier: L2
    check: judgment
    phase: [verify]
    applies_to: [page, component]
    verify: "Evaluator judges density against the page type and task (a marks-entry form and a summary dashboard have legitimately different densities)"
    waiver: rationale
    fails_when:
      - a data-entry surface is too padded for efficient tab traversal
      - a reading or scanning surface is too cramped to scan without error
    detail: controls/lay-5.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]

  - id: LAY-6
    source: TFX-DS
    title: Shared edges align; optical alignment is used where geometry misleads
    tier: L2
    check: judgment
    phase: [verify]
    applies_to: [page, component]
    verify: "Evaluator checks edge alignment in the 1280 screenshot; flags shared edges that do not align without a deliberate reason; distinguishes geometric from optical alignment (an icon optically centred but geometrically offset is correct)"
    waiver: rationale
    fails_when:
      - shared edges between sections or components do not align, with no deliberate reason
      - text or icon baselines and optical centres are visibly misaligned
    detail: controls/lay-6.md
    refs: [https://moediva.notion.site/Tfx-design-standard-draft-37b970a387f2800e930ce0ee646c6cfb]
