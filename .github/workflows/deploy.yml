name: Deploy to Vercel (production)

# Auto-deploys to the existing Vercel project on every push to main — including
# merges by other contributors. The trigger is the push itself, and auth is the
# VERCEL_TOKEN repo secret (not the pusher's account), so it always deploys to the
# same project regardless of who merges.
#
# One-time setup: add a Vercel token as a repo secret named VERCEL_TOKEN
#   1. Create a token at https://vercel.com/account/tokens (scope: reza-ilmi's projects)
#   2. gh secret set VERCEL_TOKEN --repo transformteamsg/tfx-design-standard
# The org/project IDs below are identifiers (not secrets) for the linked project.

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # allow manual re-deploy from the Actions tab

concurrency:
  group: vercel-production
  cancel-in-progress: false  # queue deploys so a later merge can't cancel an in-flight one

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: team_KrzGicaOyE7qyaXUqVokfMyM
      VERCEL_PROJECT_ID: prj_qh0Y1AG4gXXnA3vA3JWEHModxcZl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Add it with: gh secret set VERCEL_TOKEN --repo transformteamsg/tfx-design-standard"
            exit 1
          fi
          url=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          {
            echo "### Deployed to production :rocket:"
            echo ""
            echo "$url"
          } >> "$GITHUB_STEP_SUMMARY"
